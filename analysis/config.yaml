# ═══════════════════════════════════════════════════════════════════════════════
# HIBEAM TPC Analysis — Central Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# Edit THIS FILE to change any aspect of the analysis.
# No Python files need to be touched for routine use.
#
# Every script reads this file at startup via:
#     from hibeam import config
#     cfg = config.load()
# ═══════════════════════════════════════════════════════════════════════════════


# ── Data paths ────────────────────────────────────────────────────────────────
# Adjust these to point at your ROOT files.
# Relative paths are resolved from the repository root.

paths:
  simulation:
    krakow: data/simulation/KrakowScatter.root
    muon:   data/simulation/MuonScatter_fixed.root
    hibeam: data/simulation/HIBEAMScatter.root

  experimental:
    run_0006:   data/experimental/tracks_centroids_tpc_run_0006-sorted_t0_100.root
    run_0042:   data/experimental/tracks_centroids_tpc_run_0042-sorted_t0.root
    cosmics_500V: data/experimental/tracks_centroids_chamber-fec01-debug-clk0-ped0-thr0-g0-s0-p1-1008-2_sorted.root
    cosmics_243V: data/experimental/tracks_centroids_chamber-fec01-debug-clk0-ped0-thr0-g0-s0-p1-1008-4_sorted.root

  segmentation:
    krakow_dir: data/segmentation/ana_output_krakow/
    muon_dir:   data/segmentation/ana_output_muon/

  headers_so:  headers/recovered_headers.so
  headers_dir: headers/
  output_dir:  output/
  logo:        assets/ess_logo.png


# ── Physics cuts ──────────────────────────────────────────────────────────────
# Track quality and event selection thresholds.
# References: ALICE JINST 5 (2010) P09002; STAR NIM A 499 (2003) 659.

cuts:
  chi2_ndf_max:     25.0     # Track quality cut (chi²/ndf).
                              # Looser than ALICE (4.0) because the prototype
                              # TPC has fewer centroids per track.
  min_track_points: 3        # Minimum centroids per reconstructed track.
  min_adc:          0.0      # ADC noise floor for experimental data.
  noise_sigma:      3.0      # Pedestal noise threshold (units of peddev).
  min_adc_signal:   10       # Minimum raw ADC above pedestal for hit acceptance.


# ── Fitting ───────────────────────────────────────────────────────────────────
# Landau (Moyal) fit parameters.
# References: Landau (1944); Moyal (1955); PDG Statistics (2022).

fitting:
  truncation:    0.70        # Fraction of data (from the low end) included
                              # in the fit.  Standard TPC value: 70%.
  n_bins:        100         # Histogram bins spanning the fit region.
  model:         moyal       # Fit model.  Options: moyal, moyal_gauss.
  min_events:    50          # Minimum events for a reliable fit.
  max_iterations: 20000      # curve_fit maxfev.
  min_bin_counts: 5          # Minimum counts per bin for chi² validity.


# ── Simulation-specific ──────────────────────────────────────────────────────
# Per-dataset overrides for simulation analysis.

simulation:
  tree_name: hibeam          # TTree name inside simulation ROOT files.
  min_steps: 5               # Minimum Geant4 steps per event to accept.

  krakow:
    low_mev_cut: 0.0         # No low-energy cut needed for Krakow protons.
    x_max:       40.0        # Display x-axis upper limit [MeV].
  muon:
    low_mev_cut: 15.0        # Remove sub-threshold bump (delta-rays,
                              # clipping tracks, Michel electrons).
                              # Ref: Bichsel Rev.Mod.Phys. 60 (1988) Sec IV.
    x_max:       300.0
  hibeam:
    low_mev_cut: 0.0
    x_max:       50.0


# ── Experimental-specific ────────────────────────────────────────────────────

experimental:
  tree_name:  trackingData   # TTree name inside experimental ROOT files.
  upper_percentile: 95       # Clip extreme ADC tail above this percentile.


# ── Segmentation study ───────────────────────────────────────────────────────

segmentation:
  pattern:    "ana_geom_*.root"
  tree_name:  hibeam
  branch:     "ProtoTPC/Edep"
  min_steps:  1              # Keep zero-hit events visible in nhits plots.
  nsec_range: [2, 24]        # Range of nSections to analyse.
  edep_floor_mev: 0.15       # Hard lower bound cut on Edep [MeV] for fits.
                              # Removes sub-threshold plateau for nSec > 12.
  fit_nbins:  40             # Coarser bins for fit stability (Pearson chi²
                              # requires ≥ 5 counts/bin).


# ── TPC geometry ──────────────────────────────────────────────────────────────
# Fill in from TPCHit.hh to enable true dE/dx [MeV/mm].
# Leave as null to fall back to sum(Edep) [MeV].

geometry:
  pad_width:  null           # mm  (padWidth  in TPCHit.hh)
  pad_height: null           # mm  (padHeight in TPCHit.hh)
  drift_v:    null           # mm/ns (driftV  in TPCHit.hh)
  time_bin:   null           # ns  (timeBin   in TPCHit.hh)


# ── PID (ΔE-E telescope) ────────────────────────────────────────────────────

pid:
  min_tpc_hits:   1          # Require at least 1 TPC hit.
  min_scint_hits: 1          # Require at least 1 scintillator hit.


# ── Plot appearance ──────────────────────────────────────────────────────────
# All visual settings for every figure produced by the analysis.

plotting:
  style: ess                 # Global matplotlib style preset.
                              # Options: ess, cms, atlas, alice, minimal.

  # Typography
  font_family:  serif
  font_serif:   ["DejaVu Serif", "Georgia", "Times New Roman"]
  mathtext:     dejavuserif
  font_size:    10
  title_size:   11
  label_size:   10
  tick_size:    8.5
  legend_size:  8

  # Figure defaults
  figsize:      [11, 7]      # Default figure size [width, height] in inches.
  dpi:          300          # Output resolution.
  formats:      [pdf, png]   # File formats to save. Both vector and raster.

  # Colour palette — ESS branding
  colors:
    navy:       "#00263A"    # ESS primary dark
    blue:       "#005B8E"    # ESS primary mid
    cyan:       "#00A9CE"    # ESS primary bright
    silver:     "#A8B2B8"
    orange:     "#E5720F"    # Accent / warning
    green:      "#4CAF82"    # Accent / good
    purple:     "#C45AB3"
    gold:       "#FFD166"

  # Data series colours — distinguishable in print and greyscale
  series_colors:
    - "#00A9CE"              # ESS Cyan
    - "#E5720F"              # ESS Orange
    - "#4CAF82"              # ESS Green
    - "#C45AB3"              # Purple
    - "#FFD166"              # Gold

  # Histogram style
  histogram:
    fit_color:      "#2166ac"    # Strong blue — fitted region.
    tail_color:     "#d73027"    # Vermilion — excluded tail.
    fit_alpha:      0.55
    tail_alpha:     0.35
    tail_hatch:     "////"
    error_alpha:    0.25
    fit_line_color: black
    fit_line_width: 2.0

  # Axes defaults
  axes:
    tick_direction: in
    ticks_top:      true
    ticks_right:    true
    minor_ticks:    true
    line_width:     0.8

  # Pull / residual panel
  pulls:
    show:       true
    range:      [-6.5, 6.5]
    sigma_lines: [2, -2]     # Draw dashed lines at ±Nσ.
    height_ratio: [3, 1]     # [main panel, pull panel].

  # Logo placement
  logo:
    show:     true
    zoom:     0.15
    position: [0.03, 0.95]  # axes fraction [x, y].

  # Line and marker defaults
  lines:
    width:       1.6
    marker_size: 4.5
